name: Generate Golden Files

on:
  workflow_dispatch:

jobs:
  generate-windows:
    name: Generate Windows golden files
    runs-on: windows-latest
    steps:
      - name: Check out libCellML
        uses: actions/checkout@v6
        with:
          ref: issue1050
      - name: Install CMake and Ninja
        uses: lukka/get-cmake@latest
      - name: Configure MSVC
        uses: TheMrMilchmann/setup-msvc-dev@v4
        with:
          arch: x64
      - name: Install libxml2
        run: |
          cd C:\
          curl -L https://github.com/cellml/gha/releases/download/gha/libxml2-Windows.tar.gz -o libxml2.tar.gz -s
          tar -xzf libxml2.tar.gz
      - name: Install zlib
        run: |
          cd C:\
          curl -L https://github.com/cellml/gha/releases/download/gha/zlib-Windows.tar.gz -o zlib.tar.gz -s
          tar -xzf zlib.tar.gz
      - name: Configure libCellML with GENERATE_GOLDEN_FILES
        run: >
          cmake -G Ninja -S . -B build
          -DBUILD_SHARED=ON
          -DCOVERAGE=OFF
          -DLLVM_COVERAGE=OFF
          -DMEMCHECK=OFF
          -DUNIT_TESTS=ON
          -DGENERATE_GOLDEN_FILES=ON
          -DLibXml2_DIR="C:\libxml2\libxml2-2.9.10\CMake"
          -DZLIB_DIR="C:\zlib\lib\cmake\ZLIB-1.2.12"
      - name: Build libCellML
        run: cmake --build build
      - name: Generate golden files by running generator tests
        run: cmake --build build --target test_generator
      - name: Upload generated golden files
        uses: actions/upload-artifact@v4
        with:
          name: windows-golden-files
          path: tests/resources/generator/
          if-no-files-found: error
